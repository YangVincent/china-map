<style>
  :root {
    --panel-bg: rgba(255,255,255,0.92);
    --panel-border: rgba(0,0,0,0.10);
    --text: #1c1c1c;
    --text-2: #5a5a56;
    --accent: #b3541e;
  }
  body.dark {

    --panel-border: rgba(255,255,255,0.14);
    --text: #ececea;
    --text-2: #a4a49e;
    --accent: #e8956d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); }
  #map { position: absolute; inset: 0; background: #aad3df; }
  body.dark #map { background: #10151b; }

  .hud {
    position: absolute; z-index: 1000;
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  #header { top: 14px; left: 14px; padding: 10px 16px; max-width: 300px; }
  #header h1 { margin: 0; font-size: 17px; font-weight: 650; letter-spacing: -0.01em; }
  #header p { margin: 3px 0 0; font-size: 12px; color: var(--text-2); }

  #toggles { top: 14px; right: 14px; padding: 8px 10px; display: flex; gap: 6px; flex-wrap: wrap; max-width: 340px; }
  .chip {
    font-size: 12px; padding: 5px 10px; border-radius: 999px; cursor: pointer; user-select: none;
    border: 1px solid var(--panel-border); color: var(--text-2); background: transparent; white-space: nowrap;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip:hover { border-color: var(--accent); }

  #legend { bottom: 24px; left: 14px; padding: 10px 12px; max-width: 240px; }
  #legend .lg-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin-bottom: 6px; }
  .lg-row { display: flex; align-items: center; gap: 8px; padding: 3px 4px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .lg-row:hover { background: rgba(128,128,128,0.14); }
  .lg-row.active { background: rgba(128,128,128,0.20); font-weight: 600; }
  .lg-dot { width: 12px; height: 12px; border-radius: 3px; flex: none; }

  #panel {
    top: 14px; right: 14px; width: 330px; max-height: calc(100% - 120px);
    overflow-y: auto; padding: 16px 18px; display: none;
  }
  #panel.visible { display: block; }
  #panel .close { position: absolute; top: 10px; right: 12px; cursor: pointer; color: var(--text-2); font-size: 16px; line-height: 1; }
  #panel .kicker { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  #panel h2 { margin: 0 0 2px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  #panel .zh { font-size: 13px; color: var(--text-2); margin-bottom: 10px; }
  #panel .tagline { font-size: 14px; font-style: italic; color: var(--text-2); margin: 0 0 10px; }
  #panel ul { margin: 6px 0 12px; padding-left: 18px; }
  #panel li { font-size: 13px; line-height: 1.45; margin-bottom: 5px; }
  #panel .think {
    font-size: 13px; line-height: 1.45; padding: 9px 11px; border-radius: 8px;
    background: rgba(179,84,30,0.10); border-left: 3px solid var(--accent); margin-bottom: 12px;
  }
  #panel .sect { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin: 12px 0 6px; }
  .citychip {
    display: inline-block; font-size: 12px; padding: 3px 9px; margin: 0 4px 6px 0;
    border: 1px solid var(--panel-border); border-radius: 999px; cursor: pointer;
  }
  .citychip:hover { border-color: var(--accent); color: var(--accent); }
  #panel .backlink { font-size: 12px; color: var(--accent); cursor: pointer; margin-top: 4px; display: inline-block; }

  #caption {
    bottom: 24px; left: 50%; transform: translateX(-50%);
    max-width: 520px; padding: 10px 16px; display: none; font-size: 14px; line-height: 1.5;
  }
  #caption.visible { display: block; }
  #caption .who { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; margin-bottom: 2px; }

  .city-label { background: none; border: none; box-shadow: none; }
  .city-label span {
    font-size: 11px; font-weight: 600; color: #333; text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
  }
  body.dark .city-label span { color: #eee; text-shadow: 0 0 3px #000, 0 0 3px #000, 0 0 3px #000; }

  .pulse-marker { background: none; border: none; }
  .pulse-ring {
    width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--accent);
    animation: pulse 1.4s ease-out infinite; position: absolute; top: -18px; left: -18px;
  }
  .pulse-core { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); position: absolute; top: -5px; left: -5px; }
  .pulse-tag {
    position: absolute; top: 10px; left: 12px; white-space: nowrap; font-size: 12px; font-weight: 600;
    background: var(--accent); color: #fff; padding: 3px 8px; border-radius: 6px;
  }
  @keyframes pulse {
    0% { transform: scale(0.4); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .leaflet-tooltip.prov-tip { font-size: 12px; padding: 3px 8px; }
  .line-label { font-size: 12px; font-weight: 600; }
</style>
</head>

function baseStyle(adcode) {
  const meta = PROV[adcode];
  const color = meta ? REGIONS[meta.region].color : "#999";

}

    if (!meta) return;
    provLayers[adcode] = layer;
    layer.bindTooltip(`${meta.en} · ${f.properties.name}`, { sticky: true, className: "prov-tip" });
    layer.on("mouseover", () => { if (!isDimmed(adcode)) layer.setStyle({ fillOpacity: 0.55 }); });
    layer.on("mouseout", () => applyStyles());
    layer.on("click", () => { logEvent("province", meta.en); showProvince(adcode); });

}).addTo(map);

function isDimmed(adcode) {
  return activeRegion && PROV[adcode] && PROV[adcode].region !== activeRegion;
}
function applyStyles() {
  Object.entries(provLayers).forEach(([adcode, layer]) => {
    const s = baseStyle(+adcode);
    if (isDimmed(+adcode)) { s.fillOpacity = 0.06; s.weight = 0.5; }
    else if (activeRegion) { s.fillOpacity = terrainOn ? 0.3 : 0.55; s.weight = 1.5; }
    layer.setStyle(s);
  });
}

// Migration flows: interior provinces → the three coastal magnets (+ NE snowbirds to Hainan)
function flowBezier(a, b, curve, n = 28) {
  const mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const cx = mx - dy * curve, cy = my + dx * curve;
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n, u = 1 - t;
    pts.push([u * u * a[0] + 2 * u * t * cx + t * t * b[0], u * u * a[1] + 2 * u * t * cy + t * t * b[1]]);
  }
  return pts;
}
function flowArrowHead(pts, color) {
  const p1 = pts[pts.length - 2], p2 = pts[pts.length - 1];
  const lat = p2[0] * Math.PI / 180;
  const ang = Math.atan2((p2[1] - p1[1]) * Math.cos(lat), p2[0] - p1[0]) * 180 / Math.PI;
  return L.marker(p2, { interactive: false, icon: L.divIcon({ className: "", iconSize: [14, 14], iconAnchor: [7, 7],
    html: `<svg width="14" height="14" viewBox="-7 -7 14 14" style="transform:rotate(${90 - ang}deg)"><polygon points="0,-7 5,7 -5,7" fill="${color}"/></svg>` }) });
}

function geoLabel(lat, lng, text, color) {
  return L.marker([lat, lng], { interactive: false, icon: L.divIcon({ className: "city-label",

function geoDot(lat, lng, tip, color) {
  const m = L.circleMarker([lat, lng], { radius: 5, color: "#fff", weight: 1.5, fillColor: color || "#8a2e18", fillOpacity: 0.95 });
  m.bindTooltip(tip, { sticky: true, className: "prov-tip" });
  return m;
}
function geoRiver(pts, tip, opts) {
  const casing = L.polyline(pts, { color: "#ffffff", weight: (opts?.weight || 4) + 3, opacity: 0.9 });
  const line = L.polyline(pts, { color: opts?.color || "#1d6fc0", weight: opts?.weight || 4, opacity: 0.95, dashArray: opts?.dashArray || null });
  line.bindTooltip(tip, { sticky: true, className: "prov-tip" });
  return [casing, line];
}

const panel = document.getElementById("panel");

function regionPanelHTML(id) {
  const r = REGIONS[id];
  const cities = CITIES.filter(c => c.region === id)
    .map(c => `<span class="citychip" onclick="logEvent('city','${c.name}');showCity('${c.name.replace(/'/g, "\\'")}',true)">${c.name}</span>`).join("");
  return `
    <div class="kicker" style="color:${r.color}">Region</div>
    <h2>${r.name}</h2>
    <div class="zh">${r.zh}</div>
    <p class="tagline">${r.tagline}</p>
    <ul>${r.bullets.map(b => `<li>${b}</li>`).join("")}</ul>
    <div class="think"><strong>How to think about it:</strong> ${r.think}</div>
    <div class="sect">Cities</div>${cities}`;
}

function focusRegion(id) {
  const r = REGIONS[id];
  if (!r) return;
  activeRegion = id;
  applyStyles(); markLegend(id);
  const group = L.featureGroup(r.provinces.map(a => provLayers[a]).filter(Boolean));
  map.flyToBounds(group.getBounds().pad(0.12), { duration: 1.1 });
  openPanel(regionPanelHTML(id));
}

function showProvince(adcode) {
  const meta = PROV[adcode];
  if (!meta) return;
  const r = REGIONS[meta.region];
  activeRegion = null; applyStyles(); markLegend(null);
  provLayers[adcode].setStyle({ fillOpacity: 0.62, weight: 2.5, color: "#fff" });
  const zh = (CHINA_GEOJSON.features.find(f => f.properties.adcode === adcode) || {}).properties?.name || "";
  openPanel(`
    <div class="kicker" style="color:${r.color}">Province · ${r.name}</div>
    <h2>${meta.en}</h2>
    <div class="zh">${zh}</div>
    <p style="font-size:13px;line-height:1.5">${meta.blurb}</p>
    <span class="backlink" onclick="focusRegion('${meta.region}')">← See the whole ${r.name} region</span>`);
}

function showCity(name, fly) {
  const c = CITIES.find(x => x.name === name);
  if (!c) return;
  const r = REGIONS[c.region];
  if (fly) map.flyTo([c.lat, c.lng], Math.max(map.getZoom(), 6.5), { duration: 1.1 });
  pulse(c.lat, c.lng, c.name);
  openPanel(`
    <div class="kicker" style="color:${r.color}">City · ${r.name}</div>
    <h2>${c.name}</h2>
    <div class="zh">${c.zh}</div>
    <p style="font-size:13px;line-height:1.5">${c.blurb}</p>
    <span class="backlink" onclick="focusRegion('${c.region}')">← See the whole ${r.name} region</span>`);
}

function caption(text) { document.getElementById("caption-text").innerHTML = text; captionEl.classList.add("visible"); }
function clearCaption() { captionEl.classList.remove("visible"); }

window.claudeAPI = {
  flyTo: (lat, lng, zoom) => map.flyTo([lat, lng], zoom || 6, { duration: 1.3 }),
  focusRegion,
  focusProvince: q => {
    const entry = Object.entries(PROV).find(([a, m]) => m.en.toLowerCase() === String(q).toLowerCase() || String(a) === String(q));
    if (entry) { showProvince(+entry[0]); map.flyToBounds(provLayers[+entry[0]].getBounds().pad(0.3), { duration: 1.2 }); }
  },
  focusCity: name => showCity(name, true),
  pulse, clearPulse, caption, clearCaption,
  overlay: setOverlay,
  reset: resetView,
  getEvents: () => window.__events.slice()
};
</script>
